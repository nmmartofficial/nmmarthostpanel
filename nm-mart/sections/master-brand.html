<!-- Brand Master Content -->
<div id="brand-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Header -->
    <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
        <div class="flex items-center gap-8 flex-grow">
            <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                <i class="fas fa-tag"></i>
                <span>Brand Master</span>
            </div>
            <!-- Search -->
            <div class="relative w-2/5 mx-auto">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>
        <!-- Create New Button -->
        <button id="addNewBrandBtn" class="flex items-center gap-2 px-4 py-1.5 border border-blue-400 text-blue-500 rounded-md font-medium hover:bg-blue-50 transition-colors text-sm">
            <i class="fas fa-plus"></i> Create New
        </button>
    </div>

    <!-- Brand Master Entry Form (Hidden by default) -->
    <div id="brand-master-form" class="hidden p-8 bg-white flex flex-col h-full shadow-inner">
        <div class="flex items-center gap-2 text-blue-500 font-bold text-lg mb-6">
            <i class="fas fa-tag"></i>
            <span>Brand [ NEW ]</span>
        </div>
        
        <div class="space-y-6 max-w-full">
            <div class="flex flex-col gap-2">
                <label class="text-sm text-gray-700 font-medium">Brand Name</label>
                <input type="text" class="w-full border border-blue-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-blue-300">
            </div>

            <div class="flex items-center gap-4 mt-4">
                <div class="flex items-center">
                    <label class="bg-gray-100 border border-gray-300 px-3 py-1.5 rounded-l-md text-sm cursor-pointer hover:bg-gray-200">
                        Choose File
                        <input type="file" class="hidden">
                    </label>
                    <span class="border border-l-0 border-gray-300 px-3 py-1.5 rounded-r-md text-sm text-gray-500 bg-white min-w-[150px]">No file chosen</span>
                </div>
                <button class="border border-gray-400 px-4 py-1.5 rounded-md text-sm hover:bg-gray-50">Upload</button>
            </div>

            <div class="flex justify-end gap-3 pt-10">
                <button class="bg-blue-600 text-white px-8 py-2 rounded-md font-bold shadow-md hover:bg-blue-700">Save</button>
                <button id="cancelBrandBtn" class="bg-blue-600 text-white px-8 py-2 rounded-md font-bold shadow-md hover:bg-blue-700">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Brand Table -->
    <div id="brand-master-list" class="flex-grow p-4 overflow-y-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-gray-700 font-bold border-b border-gray-200 text-[11px] uppercase tracking-wider">
                    <th class="py-3 px-4">Brand ID</th>
                    <th class="py-3 px-4">Brand Name</th>
                    <th class="py-3 px-4">Slug</th>
                    <th class="py-3 px-4 text-center">Total Products</th>
                    <th class="py-3 px-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <!-- Dynamic Data -->
            </tbody>
        </table>
    </div>
</div>
