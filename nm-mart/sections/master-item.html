<!-- Item Master Content -->
<div id="item-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Item Master Header -->
    <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
        <div class="flex items-center gap-8 flex-grow">
            <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                <i class="fas fa-sitemap"></i>
                <span>Item Master</span>
            </div>
            <!-- Search -->
            <div class="relative w-1/2">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>
        <!-- Action Buttons -->
        <div class="flex items-center gap-3">
            <input type="file" id="importItemInput" class="hidden" accept=".xlsx, .xls">
            <button id="importItemBtn" class="flex items-center gap-2 px-4 py-1.5 border border-blue-400 text-blue-500 rounded-md font-medium hover:bg-blue-50 transition-colors text-sm">
                <i class="fas fa-file-import"></i> Import Item
            </button>
            <button id="addNewItemBtn" class="flex items-center gap-2 px-4 py-1.5 border border-blue-400 text-blue-500 rounded-md font-medium hover:bg-blue-50 transition-colors text-sm">
                <i class="fas fa-plus"></i> Create New
            </button>
        </div>
    </div>

    <!-- Product Entry Form -->
    <div id="item-master-form" class="hidden flex-grow overflow-y-auto bg-gray-50 p-6">
        <div class="max-w-5xl mx-auto space-y-6">
            
            <!-- 1. Product Information -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="fas fa-info-circle text-blue-500"></i> Product Information
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-600">Barcode</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                                <i class="fas fa-barcode"></i>
                            </span>
                            <input type="text" placeholder="Scan or Enter Barcode" class="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-gray-600">Product Name (Hindi / English)</label>
                        <input type="text" placeholder="e.g. Nestle Kitkat / नेस्ले किटकैट" class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm">
                    </div>
                </div>
            </div>

            <!-- 2. Pricing & Stock Block -->
            <div class="bg-blue-50 p-6 rounded-xl border border-blue-100 shadow-sm space-y-4">
                <h3 class="text-sm font-bold text-blue-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="fas fa-tag"></i> Pricing & Inventory
                </h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-blue-700">MRP (₹)</label>
                        <input type="number" id="product-mrp" placeholder="0.00" class="w-full px-4 py-2.5 bg-white border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-bold">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-blue-700">Online Selling Price (₹)</label>
                        <input type="number" id="product-selling-price" placeholder="0.00" class="w-full px-4 py-2.5 bg-white border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-bold text-blue-600">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-blue-700">Discount (%)</label>
                        <input type="text" id="product-discount" readonly value="0%" class="w-full px-4 py-2.5 bg-gray-100 border border-blue-200 rounded-lg outline-none text-sm font-black text-green-600 cursor-not-allowed">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-semibold text-blue-700">Stock Quantity</label>
                        <input type="number" placeholder="0" class="w-full px-4 py-2.5 bg-white border border-blue-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm font-bold">
                    </div>
                </div>
            </div>

            <!-- 3. E-commerce Specs -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="fas fa-align-left text-blue-500"></i> App Description
                </h3>
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-gray-600">Product Description (Visible on Mobile App)</label>
                    <textarea rows="3" placeholder="Describe the product features, benefits, or ingredients for your customers..." class="w-full px-4 py-3 bg-white border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all text-sm resize-none"></textarea>
                </div>
            </div>

            <!-- 4. Media Box -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-4">
                <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="fas fa-images text-blue-500"></i> Product Media
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Image 1 -->
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 hover:border-blue-400 transition-colors cursor-pointer group text-center space-y-2">
                        <div class="text-gray-400 group-hover:text-blue-500 transition-colors">
                            <i class="fas fa-cloud-upload-alt text-2xl"></i>
                        </div>
                        <p class="text-[11px] font-bold text-gray-500">Main Cover Photo</p>
                        <p class="text-[9px] text-gray-400">Click to upload</p>
                    </div>
                    <!-- Image 2 -->
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 hover:border-blue-400 transition-colors cursor-pointer group text-center space-y-2">
                        <div class="text-gray-400 group-hover:text-blue-500 transition-colors">
                            <i class="fas fa-camera text-2xl"></i>
                        </div>
                        <p class="text-[11px] font-bold text-gray-500">Side View</p>
                        <p class="text-[9px] text-gray-400">Click to upload</p>
                    </div>
                    <!-- Image 3 -->
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 hover:border-blue-400 transition-colors cursor-pointer group text-center space-y-2">
                        <div class="text-gray-400 group-hover:text-blue-500 transition-colors">
                            <i class="fas fa-tag text-2xl"></i>
                        </div>
                        <p class="text-[11px] font-bold text-gray-500">Info Label / HSN</p>
                        <p class="text-[9px] text-gray-400">Click to upload</p>
                    </div>
                </div>
            </div>

            <!-- 5. Action Buttons -->
            <div class="flex justify-end items-center gap-4 pt-4 pb-8">
                <button class="cancelBtn px-8 py-2.5 text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors">
                    Cancel
                </button>
                <button class="save-btn bg-blue-600 text-white px-8 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-blue-200 hover:bg-blue-700 hover:shadow-blue-300 transition-all flex items-center gap-2">
                    <i class="fas fa-rocket"></i> Save & Live on App
                </button>
            </div>
        </div>
    </div>

    <!-- Item Table -->
    <div id="item-master-list" class="flex-grow p-4 overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-gray-700 font-bold border-b border-gray-200 text-sm">
                    <th class="py-3 px-4">SNo</th>
                    <th class="py-3 px-4">Name</th>
                    <th class="py-3 px-4">Barcode</th>
                    <th class="py-3 px-4">HSN Code</th>
                    <th class="py-3 px-4">Rate</th>
                    <th class="py-3 px-4">Discount</th>
                    <th class="py-3 px-4">Picture</th>
                    <th class="py-3 px-4">Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Empty state -->
                <tr class="text-gray-400 italic text-sm">
                    <td colspan="8" class="py-10 text-center">No items found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
