<!-- User Master Content -->
<div id="user-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- User Master List View -->
    <div id="user-master-list" class="flex flex-col h-full">
        <!-- Header -->
        <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
            <div class="flex items-center gap-8 flex-grow">
                <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                    <i class="fas fa-user-cog"></i>
                    <span>User Master</span>
                </div>
                <!-- Search -->
                <div class="relative w-1/3 mx-auto">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
            </div>
            <!-- Create New Button -->
            <button id="addNewUserBtn" class="flex items-center gap-2 px-4 py-2 border border-blue-500 text-blue-500 rounded-lg font-bold hover:bg-blue-50 transition-colors text-sm">
                <i class="fas fa-plus"></i> Create New
            </button>
        </div>

        <!-- Empty State -->
        <div class="flex-grow flex items-center justify-center text-gray-500 text-sm">
            There are no records to display
        </div>
    </div>

    <!-- User Master Entry Form (Hidden by default) -->
    <div id="user-master-form" class="hidden p-6 bg-white flex flex-col h-full overflow-y-auto">
        <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-2 text-blue-600 font-bold text-lg">
                <i class="fas fa-user-plus"></i>
                <span>User [ NEW ]</span>
            </div>
            <div class="flex gap-3">
                <button class="bg-blue-600 text-white px-8 py-1.5 rounded text-sm font-bold shadow-md hover:bg-blue-700">Save</button>
                <button id="cancelUserBtn" class="bg-blue-600 text-white px-8 py-1.5 rounded text-sm font-bold shadow-md hover:bg-blue-700">Cancel</button>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-8 mb-8">
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">User Name</label>
                <input type="text" class="border border-blue-300 rounded p-2 text-sm outline-none focus:ring-1 focus:ring-blue-400 w-full">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Password</label>
                <input type="password" value="......" class="border border-blue-100 bg-blue-50/30 rounded p-2 text-sm outline-none w-full">
            </div>
        </div>

        <!-- Permissions Table -->
        <div class="flex-grow">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-gray-800 font-bold border-b border-gray-300 text-xs">
                        <th class="py-2 w-1/3">Page Name</th>
                        <th class="py-2 text-center px-4"><div class="flex items-center justify-center gap-2"><input type="checkbox" class="w-3 h-3"> View</div></th>
                        <th class="py-2 text-center px-4"><div class="flex items-center justify-center gap-2"><input type="checkbox" class="w-3 h-3"> Create</div></th>
                        <th class="py-2 text-center px-4"><div class="flex items-center justify-center gap-2"><input type="checkbox" class="w-3 h-3"> Edit</div></th>
                        <th class="py-2 text-center px-4"><div class="flex items-center justify-center gap-2"><input type="checkbox" class="w-3 h-3"> Delete</div></th>
                    </tr>
                </thead>
                <tbody class="text-xs text-gray-600">
                    <!-- Permission Rows -->
                    <tr class="border-b border-gray-200">
                        <td class="py-2">Item Master</td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                    </tr>
                    <tr class="border-b border-gray-200">
                        <td class="py-2">Item Unit Master</td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                        <td class="py-2 text-center"><input type="checkbox" class="w-3 h-3"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
