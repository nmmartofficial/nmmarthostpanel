<!-- Main Category Content -->
<div id="main-cat-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Header -->
    <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
        <div class="flex items-center gap-8 flex-grow">
            <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                <i class="fas fa-layer-group"></i>
                <span>Main Category</span>
            </div>
            <!-- Search -->
            <div class="relative w-1/2">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>
        <!-- Create New Button -->
        <button id="addNewMainCatBtn" class="flex items-center gap-2 px-4 py-1.5 border border-blue-400 text-blue-500 rounded-md font-medium hover:bg-blue-50 transition-colors text-sm">
            <i class="fas fa-plus"></i> Create New
        </button>
    </div>

    <!-- Category Entry Form -->
    <div id="main-cat-master-form" class="hidden p-6 border-b border-gray-100 bg-gray-50">
        <div class="max-w-4xl grid grid-cols-2 gap-6 items-end">
            <div class="flex flex-col gap-1">
                <label class="text-[10px] font-bold text-gray-500 uppercase">Category Name</label>
                <input type="text" placeholder="Category Name" class="border border-gray-300 rounded p-2 text-sm outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-2">
                <button class="save-btn bg-blue-600 text-white px-8 py-2 rounded text-sm font-bold shadow-md">Save</button>
                <button class="cancelBtn border border-gray-300 text-gray-600 px-8 py-2 rounded text-sm font-bold hover:bg-gray-100">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Category Table -->
    <div id="main-cat-master-list" class="flex-grow p-4 overflow-y-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-gray-700 font-bold border-b border-gray-200 text-sm">
                    <th class="py-3 px-4">SNo</th>
                    <th class="py-3 px-4">Category Name</th>
                    <th class="py-3 px-4 text-center">Icon/Image</th>
                    <th class="py-3 px-4 text-right">Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Dynamic Data -->
            </tbody>
        </table>
    </div>
</div>
