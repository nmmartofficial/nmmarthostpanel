<!-- Delivery Customer Master Content -->
<div id="delivery-customer-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Delivery Customer Master List View -->
    <div id="delivery-customer-master-list" class="flex flex-col h-full">
        <!-- Header -->
        <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
            <div class="flex items-center gap-8 flex-grow">
                <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                    <i class="fas fa-users"></i>
                    <span>Delivery Customer Master</span>
                </div>
                <!-- Search -->
                <div class="relative w-1/3 mx-auto">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
            </div>
            <!-- Create New Button -->
            <button id="addNewDeliveryCustomerBtn" class="flex items-center gap-2 px-4 py-2 border border-blue-500 text-blue-500 rounded-lg font-bold hover:bg-blue-50 transition-colors text-sm">
                <i class="fas fa-plus"></i> Create New
            </button>
        </div>

        <!-- Customer Table -->
        <div class="flex-grow p-4 overflow-y-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-gray-700 font-bold border-b border-gray-200 text-sm">
                        <th class="py-3 px-4">SNo</th>
                        <th class="py-3 px-4">Customer Name</th>
                        <th class="py-3 px-4">Mob No</th>
                        <th class="py-3 px-4">Address</th>
                        <th class="py-3 px-4">Gst No</th>
                        <th class="py-3 px-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <td class="py-3 px-4">1</td>
                        <td class="py-3 px-4">Abdul</td>
                        <td class="py-3 px-4">7081154604</td>
                        <td class="py-3 px-4">naya nagar dhata ro...</td>
                        <td class="py-3 px-4 text-gray-400"></td>
                        <td class="py-3 px-4 text-right space-x-2">
                            <button class="px-3 py-1 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 font-medium"><i class="fas fa-edit mr-1"></i> Edit</button>
                            <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 font-medium"><i class="fas fa-trash mr-1"></i> Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Delivery Customer Master Entry Form (Hidden by default) -->
    <div id="delivery-customer-master-form" class="hidden p-6 bg-white flex flex-col h-full">
        <div class="flex items-center gap-2 text-blue-600 font-bold text-lg mb-6">
            <i class="fas fa-users"></i>
            <span>Customer [ NEW ]</span>
        </div>
        
        <div class="max-w-4xl space-y-4">
            <div class="flex flex-col gap-1">
                <label class="text-sm font-medium text-gray-600">Customer Name</label>
                <input type="text" class="border border-blue-300 rounded p-2 text-sm outline-none focus:ring-1 focus:ring-blue-400 w-full">
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-3">
            <button class="bg-blue-600 text-white px-8 py-2 rounded font-bold shadow-md hover:bg-blue-700">Save</button>
            <button id="cancelDeliveryCustomerBtn" class="bg-blue-600 text-white px-8 py-2 rounded font-bold shadow-md hover:bg-blue-700">Cancel</button>
        </div>
    </div>
</div>
