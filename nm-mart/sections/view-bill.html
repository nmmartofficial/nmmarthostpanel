<!-- Bill Details View -->
<div id="bill-details-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Header / Toolbar -->
    <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-white shadow-sm">
        <div class="flex items-center gap-8 flex-grow">
            <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                <i class="fas fa-database"></i>
                <span>Bill Details</span>
            </div>
            <!-- Search -->
            <div class="relative w-1/3 mx-auto">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Search" class="pl-10 pr-4 py-1.5 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>

        <!-- Date Filters -->
        <div class="flex items-center gap-6 text-[13px] font-medium text-gray-600">
            <div class="flex items-center gap-2">
                <span>From :</span>
                <div class="relative">
                    <input type="text" value="22/05/2026" class="border border-gray-200 rounded-md px-3 py-1.5 w-32 outline-none focus:border-blue-400">
                    <i class="far fa-calendar-alt absolute right-2 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span>To :</span>
                <div class="relative">
                    <input type="text" value="22/05/2026" class="border border-gray-200 rounded-md px-3 py-1.5 w-32 outline-none focus:border-blue-400">
                    <i class="far fa-calendar-alt absolute right-2 top-1/2 -translate-y-1/2 text-gray-400"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div class="flex-grow overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-gray-800 font-bold text-[13px] border-b border-gray-100">
                    <th class="py-3 px-6">BlNo</th>
                    <th class="py-3 px-6">Bill Date</th>
                    <th class="py-3 px-6">Time</th>
                    <th class="py-3 px-6">Party</th>
                    <th class="py-3 px-6">Bill Amount</th>
                    <th class="py-3 px-6">Customer Mob</th>
                    <th class="py-3 px-6">Customer Name</th>
                    <th class="py-3 px-6">Action</th>
                </tr>
            </thead>
            <tbody class="text-[14px]">
                <!-- Row 1 -->
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors bg-gray-50/30">
                    <td class="py-4 px-6 text-gray-700">15</td>
                    <td class="py-4 px-6 text-gray-700">22/05/26</td>
                    <td class="py-4 px-6 text-gray-700 uppercase">05:19 PM</td>
                    <td class="py-4 px-6"></td>
                    <td class="py-4 px-6 font-medium text-gray-800">71</td>
                    <td class="py-4 px-6 text-gray-700">0</td>
                    <td class="py-4 px-6"></td>
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-2">
                            <button class="w-8 h-8 flex items-center justify-center border border-blue-400 rounded text-blue-500 hover:bg-blue-50">
                                <i class="fas fa-info-circle text-[12px]"></i>
                            </button>
                            <button class="delete-btn w-8 h-8 flex items-center justify-center bg-red-500 rounded text-white hover:bg-red-600">
                                <i class="fas fa-trash-alt text-[12px]"></i>
                            </button>
                            <button class="print-btn w-8 h-8 flex items-center justify-center border border-blue-400 rounded text-blue-700 hover:bg-blue-50">
                                <i class="fas fa-print text-[12px]"></i>
                            </button>
                            <button class="edit-btn w-8 h-8 flex items-center justify-center border border-blue-400 rounded text-blue-500 hover:bg-blue-50">
                                <i class="far fa-eye text-[12px]"></i>
                            </button>
                            <button class="w-8 h-8 flex items-center justify-center border border-black rounded text-black hover:bg-gray-100">
                                <i class="fas fa-ban text-[12px]"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                <!-- Row 2 -->
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                    <td class="py-4 px-6 text-gray-700">14</td>
                    <td class="py-4 px-6 text-gray-700">22/05/26</td>
                    <td class="py-4 px-6 text-gray-700 uppercase">05:19 PM</td>
                    <td class="py-4 px-6"></td>
                    <td class="py-4 px-6 font-medium text-gray-800">71</td>
                    <td class="py-4 px-6 text-gray-700">0</td>
                    <td class="py-4 px-6"></td>
                    <td class="py-4 px-6">
                        <div class="flex items-center gap-2">
                            <button class="w-8 h-8 flex items-center justify-center border border-blue-400 rounded text-blue-500 hover:bg-blue-50">
                                <i class="fas fa-info-circle text-[12px]"></i>
                            </button>
                            <button class="w-8 h-8 flex items-center justify-center bg-red-500 rounded text-white hover:bg-red-600">
                                <i class="fas fa-trash-alt text-[12px]"></i>
                            </button>
                            <button class="w-8 h-8 flex items-center justify-center border border-blue-400 rounded text-blue-700 hover:bg-blue-50">
                                <i class="fas fa-print text-[12px]"></i>
                            </button>
                            <button class="w-8 h-8 flex items-center justify-center border border-blue-400 rounded text-blue-500 hover:bg-blue-50">
                                <i class="far fa-eye text-[12px]"></i>
                            </button>
                            <button class="w-8 h-8 flex items-center justify-center border border-black rounded text-black hover:bg-gray-100">
                                <i class="fas fa-ban text-[12px]"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
