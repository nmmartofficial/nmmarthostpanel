<!-- Transaction Content -->
<div id="transaction-content" class="flex-grow flex flex-col bg-white">
    <!-- Transaction List View -->
    <div id="transaction-list-view" class="flex flex-col h-full">
        <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2 text-xl font-bold text-gray-700">
                    <i class="fas fa-money-bill-transfer"></i>
                    <span>Transaction</span>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-64 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
                <div class="flex items-center gap-4 text-sm text-gray-600">
                    <div class="flex items-center gap-2">
                        <span>From :</span>
                        <input type="date" value="2026-05-22" class="border border-gray-300 rounded px-2 py-1 outline-none">
                    </div>
                    <div class="flex items-center gap-2">
                        <span>To :</span>
                        <input type="date" value="2026-05-22" class="border border-gray-300 rounded px-2 py-1 outline-none">
                    </div>
                </div>
            </div>
            <button id="addNewTransactionBtn" class="flex items-center gap-2 px-4 py-2 border-2 border-blue-500 text-blue-500 rounded-lg font-bold hover:bg-blue-50 transition-colors">
                <i class="fas fa-plus"></i> Transaction
            </button>
        </div>
        <div class="flex-grow p-4">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-gray-700 font-bold border-b border-gray-200 text-sm uppercase tracking-tight">
                        <th class="py-3 px-4">Date</th>
                        <th class="py-3 px-4">V No</th>
                        <th class="py-3 px-4">Type</th>
                        <th class="py-3 px-4">Time</th>
                        <th class="py-3 px-4">Ledger Name</th>
                        <th class="py-3 px-4 text-right">Dr</th>
                        <th class="py-3 px-4 text-right">Cr</th>
                        <th class="py-3 px-4">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="text-gray-400 italic text-sm"><td colspan="8" class="py-10 text-center">No transaction records found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Transaction Entry Form (Hidden by default) -->
    <div id="transaction-entry-view" class="hidden flex flex-col h-full bg-white">
        <div class="p-3 bg-slate-600 text-white flex items-center gap-2 text-sm font-bold">
            <i class="fas fa-money-bill-transfer"></i>
            <span>Transaction</span>
        </div>
        
        <div class="p-6 space-y-6">
            <!-- Top Row -->
            <div class="flex items-center gap-12">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-medium text-gray-600">Transaction Type</span>
                    <select class="border border-gray-300 rounded p-2 text-sm w-64 outline-none focus:border-blue-500">
                        <option>Receipt</option>
                        <option>Payment</option>
                    </select>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm font-medium text-gray-600">Voucher Date</span>
                    <input type="date" value="2026-05-22" class="border border-gray-300 rounded p-2 text-sm w-48 outline-none">
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm font-medium text-gray-600">Account</span>
                    <select class="border border-gray-300 rounded p-2 text-sm w-64 outline-none focus:border-blue-500">
                        <option>Not Selected</option>
                    </select>
                </div>
            </div>

            <!-- Middle Row -->
            <div class="flex items-end gap-4">
                <div class="flex flex-col gap-2 flex-grow">
                    <span class="text-xs font-bold text-gray-500 uppercase">Party Name</span>
                    <input type="text" placeholder="Search for Party..." class="border border-gray-300 rounded p-2 text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex flex-col gap-2 w-32">
                    <span class="text-xs font-bold text-gray-500 uppercase">Amount</span>
                    <input type="text" class="border border-gray-300 rounded p-2 text-sm outline-none focus:border-blue-500">
                </div>
                <div class="flex flex-col gap-2 flex-grow">
                    <span class="text-xs font-bold text-gray-500 uppercase">Remarks</span>
                    <input type="text" class="border border-gray-300 rounded p-2 text-sm outline-none focus:border-blue-500">
                </div>
                <button class="bg-red-400 text-white px-6 py-2 rounded text-sm font-bold flex items-center gap-2 shadow-sm">
                    <i class="fas fa-plus-circle"></i> Add
                </button>
            </div>

            <!-- Form Table -->
            <div class="w-full">
                <div class="flex bg-gradient-to-r from-cyan-400 via-red-400 to-cyan-400 p-2 text-white text-xs font-bold uppercase tracking-wider">
                    <div class="w-1/2">Party Name</div>
                    <div class="w-1/6 text-center">Amount</div>
                    <div class="w-1/4">Remarks</div>
                    <div class="flex-grow text-right">Action</div>
                </div>
                <div class="bg-slate-800 text-white p-2 flex justify-between text-xs font-bold">
                    <span>Total :</span>
                    <span class="mr-64">0.00</span>
                </div>
                <div class="h-64 border border-gray-100 bg-gray-50/30"></div>
            </div>
        </div>

        <!-- Footer Buttons -->
        <div class="mt-auto border-t border-gray-200 p-4 flex items-center justify-end gap-3">
            <button class="bg-blue-600 text-white px-6 py-2 rounded text-sm font-bold shadow-md">Save & Print</button>
            <button class="bg-blue-600 text-white px-8 py-2 rounded text-sm font-bold shadow-md">Save</button>
            <button id="cancelTransactionBtn" class="border border-blue-500 text-blue-500 px-8 py-2 rounded text-sm font-bold">Cancel</button>
            <div class="ml-4 bg-black text-white px-8 py-2 rounded flex items-center gap-12">
                <span class="text-sm font-bold">Total :</span>
                <span class="text-lg font-black">0.00</span>
            </div>
        </div>
    </div>
</div>
