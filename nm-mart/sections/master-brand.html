<!-- Brand Master Content -->
<div id="brand-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Header -->
    <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
        <div class="flex items-center gap-8 flex-grow">
            <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                <i class="fas fa-tag"></i>
                <span>Brand Master</span>
            </div>
            <!-- Search -->
            <div class="relative w-2/5 mx-auto">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>
        <!-- Create New Button -->
        <button id="addNewBrandBtn" class="flex items-center gap-2 px-4 py-1.5 border border-blue-400 text-blue-500 rounded-md font-medium hover:bg-blue-50 transition-colors text-sm">
            <i class="fas fa-plus"></i> Create New
        </button>
    </div>

    <!-- Brand Master Entry Form (Hidden by default) -->
    <div id="brand-master-form" class="hidden p-8 bg-white flex flex-col h-full shadow-inner">
        <div class="flex items-center gap-2 text-blue-500 font-bold text-lg mb-6">
            <i class="fas fa-tag"></i>
            <span>Brand [ NEW ]</span>
        </div>
        
        <div class="space-y-6 max-w-full">
            <div class="flex flex-col gap-2">
                <label class="text-sm text-gray-700 font-medium">Brand Name</label>
                <input type="text" class="w-full border border-blue-200 rounded-lg p-3 text-sm outline-none focus:ring-2 focus:ring-blue-300">
            </div>

            <div class="flex items-center gap-4 mt-4">
                <div class="flex items-center">
                    <label class="bg-gray-100 border border-gray-300 px-3 py-1.5 rounded-l-md text-sm cursor-pointer hover:bg-gray-200">
                        Choose File
                        <input type="file" class="hidden">
                    </label>
                    <span class="border border-l-0 border-gray-300 px-3 py-1.5 rounded-r-md text-sm text-gray-500 bg-white min-w-[150px]">No file chosen</span>
                </div>
                <button class="border border-gray-400 px-4 py-1.5 rounded-md text-sm hover:bg-gray-50">Upload</button>
            </div>

            <div class="flex justify-end gap-3 pt-10">
                <button class="bg-blue-600 text-white px-8 py-2 rounded-md font-bold shadow-md hover:bg-blue-700">Save</button>
                <button id="cancelBrandBtn" class="bg-blue-600 text-white px-8 py-2 rounded-md font-bold shadow-md hover:bg-blue-700">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Brand Master List View -->
    <div id="brand-master-list" class="flex-grow p-4 overflow-y-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-gray-500 font-semibold border-b border-gray-100 text-[13px]">
                    <th class="py-3 px-4 w-24">SNo</th>
                    <th class="py-3 px-4">Brand Name</th>
                    <th class="py-3 px-4 text-center">Picture</th>
                    <th class="py-3 px-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <!-- Sample Row 1 -->
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                    <td class="py-3 px-4 text-gray-600">1</td>
                    <td class="py-3 px-4 font-medium">NESTLE</td>
                    <td class="py-3 px-4">
                        <div class="flex justify-center">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Nestl%C3%A9_logo.svg/2560px-Nestl%C3%A9_logo.svg.png" alt="Nestle" class="h-8 object-contain">
                        </div>
                    </td>
                    <td class="py-3 px-4 text-right space-x-2">
                        <button class="px-3 py-1 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100 text-xs font-bold inline-flex items-center gap-1">
                            <i class="far fa-edit"></i> Edit
                        </button>
                        <button class="px-3 py-1 bg-red-500 text-white rounded-md hover:bg-red-600 text-xs font-bold inline-flex items-center gap-1">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
                <!-- Sample Row 2 -->
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                    <td class="py-3 px-4 text-gray-600">2</td>
                    <td class="py-3 px-4 font-medium">ACT II</td>
                    <td class="py-3 px-4">
                        <div class="flex justify-center">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT6-m-w79E_f6X3j5vW-9H8e9N9-N-N-N-N&s" alt="ACT II" class="h-8 object-contain">
                        </div>
                    </td>
                    <td class="py-3 px-4 text-right space-x-2">
                        <button class="px-3 py-1 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100 text-xs font-bold inline-flex items-center gap-1">
                            <i class="far fa-edit"></i> Edit
                        </button>
                        <button class="px-3 py-1 bg-red-500 text-white rounded-md hover:bg-red-600 text-xs font-bold inline-flex items-center gap-1">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
                <!-- Sample Row 3 -->
                <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
                    <td class="py-3 px-4 text-gray-600">3</td>
                    <td class="py-3 px-4 font-medium">CADBURY</td>
                    <td class="py-3 px-4">
                        <div class="flex justify-center">
                            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR-f-f-f-f-f-f-f-f-f-f-f-f-f-f-f-f&s" alt="CADBURY" class="h-8 object-contain">
                        </div>
                    </td>
                    <td class="py-3 px-4 text-right space-x-2">
                        <button class="px-3 py-1 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-100 text-xs font-bold inline-flex items-center gap-1">
                            <i class="far fa-edit"></i> Edit
                        </button>
                        <button class="px-3 py-1 bg-red-500 text-white rounded-md hover:bg-red-600 text-xs font-bold inline-flex items-center gap-1">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Pagination Footer -->
        <div class="mt-4 flex items-center justify-end gap-6 text-[13px] text-gray-600 p-4 border-t border-gray-50">
            <div class="flex items-center gap-2">
                <span>Rows per page:</span>
                <select class="bg-transparent outline-none cursor-pointer font-medium">
                    <option>10</option>
                </select>
                <i class="fas fa-caret-down text-[10px]"></i>
            </div>
            <span>1-10 of 157</span>
            <div class="flex items-center gap-4 ml-4">
                <i class="fas fa-chevron-left text-gray-300 cursor-not-allowed"></i>
                <i class="fas fa-chevron-right cursor-pointer hover:text-blue-500"></i>
            </div>
        </div>
    </div>
</div>
