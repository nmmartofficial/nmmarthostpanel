<!-- Delivery Boy Master Content -->
<div id="delivery-boy-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Delivery Boy Master List View -->
    <div id="delivery-boy-master-list" class="flex flex-col h-full">
        <!-- Header -->
        <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
            <div class="flex items-center gap-8 flex-grow">
                <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                    <i class="fas fa-truck-loading"></i>
                    <span>Delivery Boy Master</span>
                </div>
                <!-- Search -->
                <div class="relative w-1/3 mx-auto">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
            </div>
            <!-- Create New Button -->
            <button id="addNewDeliveryBoyBtn" class="flex items-center gap-2 px-4 py-2 border border-blue-500 text-blue-500 rounded-lg font-bold hover:bg-blue-50 transition-colors text-sm">
                <i class="fas fa-plus"></i> Create New
            </button>
        </div>

        <!-- Delivery Boy Table -->
        <div id="delivery-boy-master-table" class="flex-grow p-4 overflow-y-auto bg-white">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-gray-700 font-bold border-b border-gray-200 text-[11px] uppercase tracking-wider">
                        <th class="py-3 px-4">Rider ID</th>
                        <th class="py-3 px-4">Name</th>
                        <th class="py-3 px-4">Mobile Number</th>
                        <th class="py-3 px-4">Vehicle Type</th>
                        <th class="py-3 px-4 text-center">Live Status</th>
                        <th class="py-3 px-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="delivery-boy-master-list-body" class="text-sm">
                    <!-- Dynamic Data -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Delivery Boy Master Entry Form (Hidden by default) -->
    <div id="delivery-boy-master-form" class="hidden p-6 bg-white flex flex-col h-full">
        <div class="flex items-center gap-2 text-blue-600 font-bold text-lg mb-6">
            <i class="fas fa-truck-loading"></i>
            <span>Delivery boy [ NEW ]</span>
        </div>
        
        <div class="grid grid-cols-3 gap-6 items-end">
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Delivery boy</label>
                <input type="text" class="border border-blue-300 rounded p-2 text-sm outline-none focus:ring-1 focus:ring-blue-400">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Username name</label>
                <input type="text" value="20" class="border border-gray-200 bg-gray-100 rounded p-2 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Password</label>
                <input type="password" class="border border-gray-200 rounded p-2 text-sm outline-none">
            </div>
        </div>

        <div class="mt-8 flex justify-center gap-3">
            <button class="bg-blue-600 text-white px-8 py-2 rounded font-bold shadow-md hover:bg-blue-700">Save</button>
            <button id="cancelDeliveryBoyBtn" class="bg-blue-600 text-white px-8 py-2 rounded font-bold shadow-md hover:bg-blue-700">Cancel</button>
        </div>
    </div>
</div>
