<!-- Live Orders Dashboard Content -->
<div id="orders-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Header -->
    <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-slate-900 text-white shadow-lg">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center animate-pulse">
                <i class="fas fa-rss text-white"></i>
            </div>
            <div>
                <h2 class="text-xl font-bold tracking-tight">Live Orders Feed</h2>
                <p class="text-[10px] text-emerald-400 uppercase font-bold tracking-widest">Real-time Cloud Sync Active</p>
            </div>
        </div>
        <div class="flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase">Today's Orders</p>
                <p class="text-xl font-black" id="todayOrderCount">0</p>
            </div>
            <div class="h-8 w-[1px] bg-gray-700"></div>
            <div class="text-right">
                <p class="text-[10px] text-gray-400 uppercase">Today's Revenue</p>
                <p class="text-xl font-black text-emerald-400" id="todayRevenue">₹0.00</p>
            </div>
        </div>
    </div>

    <!-- Live Orders Table -->
    <div class="flex-grow overflow-x-auto bg-slate-50">
        <table class="w-full text-left border-collapse">
            <thead class="sticky top-0 bg-white shadow-sm z-10">
                <tr class="text-gray-500 font-bold text-[11px] uppercase tracking-wider border-b border-gray-100">
                    <th class="py-4 px-6">Time</th>
                    <th class="py-4 px-6">Bill No</th>
                    <th class="py-4 px-6">Customer</th>
                    <th class="py-4 px-6">Type</th>
                    <th class="py-4 px-6 text-right">Amount</th>
                    <th class="py-4 px-6 text-center">Status</th>
                    <th class="py-4 px-6 text-right">Action</th>
                </tr>
            </thead>
            <tbody id="live-orders-table-body" class="text-sm">
                <!-- Real-time orders will be prepended here -->
                <tr id="no-orders-msg">
                    <td colspan="7" class="py-20 text-center text-gray-400 italic">
                        <i class="fas fa-inbox text-4xl mb-4 block opacity-20"></i>
                        Waiting for new orders...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Notification Sound -->
<audio id="orderAlertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
