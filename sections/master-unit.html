<!-- Item Unit Master Content -->
<div id="item-unit-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Item Unit Master Header -->
    <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
        <div class="flex items-center gap-8 flex-grow">
            <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                <i class="fas fa-truck-loading"></i>
                <span>Item Unit Master</span>
            </div>
            <!-- Search -->
            <div class="relative w-1/3">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>
        <!-- Create New Button -->
        <button id="addNewUnitBtn" class="flex items-center gap-2 px-4 py-2 border border-blue-500 text-blue-500 rounded-lg font-bold hover:bg-blue-50 transition-colors text-sm">
            <i class="fas fa-plus"></i> Create New
        </button>
    </div>

    <!-- Inline Entry Form -->
    <div id="unit-master-form" class="hidden p-6 border-b border-gray-100 bg-gray-50">
        <div class="max-w-2xl flex items-end gap-4">
            <div class="flex-grow flex flex-col gap-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Unit Name</label>
                <input type="text" placeholder="Enter Unit Name (e.g. Kg, Nos)" class="border border-gray-300 rounded p-2 text-sm outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-2">
                <button class="bg-blue-600 text-white px-6 py-2 rounded text-sm font-bold shadow-md">Save</button>
                <button class="cancelBtn border border-gray-300 text-gray-600 px-6 py-2 rounded text-sm font-bold hover:bg-gray-100">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Unit Table -->
    <div class="flex-grow p-4">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="text-gray-700 font-bold border-b border-gray-200 text-sm">
                    <th class="py-3 px-4 w-24">SNo</th>
                    <th class="py-3 px-4">Unit Name</th>
                    <th class="py-3 px-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                    <td class="py-4 px-4">1</td>
                    <td class="py-4 px-4">Nos</td>
                    <td class="py-4 px-4 text-right space-x-2">
                        <button class="px-3 py-1 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 font-medium"><i class="fas fa-edit mr-1"></i> Edit</button>
                        <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 font-medium"><i class="fas fa-trash mr-1"></i> Delete</button>
                    </td>
                </tr>
                <tr class="border-b border-gray-100 hover:bg-gray-50 transition-colors">
                    <td class="py-4 px-4">2</td>
                    <td class="py-4 px-4">Kg</td>
                    <td class="py-4 px-4 text-right space-x-2">
                        <button class="px-3 py-1 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 font-medium"><i class="fas fa-edit mr-1"></i> Edit</button>
                        <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 font-medium"><i class="fas fa-trash mr-1"></i> Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
