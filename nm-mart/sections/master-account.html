<!-- Account Master Content -->
<div id="account-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Account Master List View -->
    <div id="account-master-list" class="flex flex-col h-full">
        <!-- Header -->
        <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
            <div class="flex items-center gap-8 flex-grow">
                <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                    <i class="fas fa-id-card"></i>
                    <span>Account Master</span>
                </div>
                <!-- Search -->
                <div class="relative w-1/3">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                </div>
            </div>
            <!-- Create New Button -->
            <button id="addNewAccountBtn" class="flex items-center gap-2 px-4 py-1.5 border border-blue-400 text-blue-500 rounded-md font-medium hover:bg-blue-50 transition-colors text-sm">
                <i class="fas fa-plus"></i> Create New
            </button>
        </div>

        <!-- Account Table -->
        <div class="flex-grow p-4 overflow-y-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-gray-700 font-bold border-b border-gray-200 text-sm">
                        <th class="py-3 px-4">Party Name</th>
                        <th class="py-3 px-4">Address</th>
                        <th class="py-3 px-4">Mobile</th>
                        <th class="py-3 px-4">Email</th>
                        <th class="py-3 px-4">GST No</th>
                        <th class="py-3 px-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors font-bold">
                        <td class="py-4 px-4">CASH</td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4">0</td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4 text-right space-x-2">
                            <button class="px-3 py-1 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 font-medium"><i class="fas fa-edit mr-1"></i> Edit</button>
                            <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 font-medium"><i class="fas fa-trash mr-1"></i> Delete</button>
                        </td>
                    </tr>
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors font-bold">
                        <td class="py-4 px-4">UPI</td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4">0</td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4 text-right space-x-2">
                            <button class="px-3 py-1 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 font-medium"><i class="fas fa-edit mr-1"></i> Edit</button>
                            <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 font-medium"><i class="fas fa-trash mr-1"></i> Delete</button>
                        </td>
                    </tr>
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors font-bold">
                        <td class="py-4 px-4">WALLET</td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4">0</td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4 text-gray-400"></td>
                        <td class="py-4 px-4 text-right space-x-2">
                            <button class="px-3 py-1 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 font-medium"><i class="fas fa-edit mr-1"></i> Edit</button>
                            <button class="px-3 py-1 bg-red-500 text-white rounded hover:bg-red-600 font-medium"><i class="fas fa-trash mr-1"></i> Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Account Entry Form (Hidden by default) -->
    <div id="account-master-form" class="hidden p-6 bg-white flex flex-col h-full">
        <div class="flex items-center gap-2 text-blue-600 font-bold text-lg mb-6">
            <i class="fas fa-tree"></i>
            <span>Account [ NEW ]</span>
        </div>
        
        <div class="grid grid-cols-4 gap-6">
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Party Name</label>
                <input type="text" class="border border-blue-300 rounded p-2 text-sm outline-none focus:ring-1 focus:ring-blue-400">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Address 1</label>
                <input type="text" class="border border-gray-200 rounded p-2 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Address 2</label>
                <input type="text" class="border border-gray-200 rounded p-2 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Pin Code</label>
                <input type="text" class="border border-gray-200 rounded p-2 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">GST No</label>
                <input type="text" class="border border-gray-200 rounded p-2 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Mobile No</label>
                <input type="text" class="border border-gray-200 rounded p-2 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Email</label>
                <input type="email" class="border border-gray-200 rounded p-2 text-sm outline-none">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[11px] font-bold text-gray-500">Account Type</label>
                <select class="border border-gray-200 rounded p-2 text-sm outline-none">
                    <option>Cash</option>
                    <option>Bank</option>
                    <option>Party</option>
                </select>
            </div>
        </div>

        <div class="mt-8 flex justify-end gap-3">
            <button class="save-btn bg-blue-600 text-white px-8 py-2 rounded font-bold shadow-md hover:bg-blue-700">Save</button>
            <button id="cancelAccountBtn" class="bg-blue-600 text-white px-8 py-2 rounded font-bold shadow-md hover:bg-blue-700">Cancel</button>
        </div>
    </div>
</div>
