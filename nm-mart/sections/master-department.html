<!-- Department Master Content -->
<div id="department-master-content" class="flex-grow flex flex-col bg-white overflow-hidden">
    <!-- Header -->
    <div class="p-4 border-b border-gray-200 flex items-center justify-between bg-white shadow-sm">
        <div class="flex items-center gap-8 flex-grow">
            <div class="flex items-center gap-2 text-xl font-bold text-gray-700 min-w-fit">
                <i class="fas fa-warehouse"></i>
                <span>Department Master</span>
            </div>
            <!-- Search -->
            <div class="relative w-1/3">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Search" class="pl-10 pr-4 py-2 bg-gray-100 border-none rounded-md w-full focus:ring-2 focus:ring-blue-500 outline-none text-sm">
            </div>
        </div>
        <!-- Create New Button -->
        <button id="addNewDeptBtn" class="flex items-center gap-2 px-4 py-2 border border-blue-500 text-blue-500 rounded-lg font-bold hover:bg-blue-50 transition-colors text-sm">
            <i class="fas fa-plus"></i> Create New
        </button>
    </div>

    <!-- Inline Entry Form -->
    <div id="dept-master-form" class="hidden p-6 border-b border-gray-100 bg-gray-50">
        <div class="max-w-2xl flex items-end gap-4">
            <div class="flex-grow flex flex-col gap-2">
                <label class="text-xs font-bold text-gray-500 uppercase">Department Name</label>
                <input type="text" placeholder="Enter Department Name" class="border border-gray-300 rounded p-2 text-sm outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-2">
                <button class="bg-blue-600 text-white px-6 py-2 rounded text-sm font-bold shadow-md">Save</button>
                <button id="cancelDeptBtn" class="cancelBtn border border-gray-300 text-gray-600 px-6 py-2 rounded text-sm font-bold hover:bg-gray-100">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Department Table -->
    <div id="department-master-list" class="flex-grow p-4">
        <div id="dept-empty-state" class="py-10 text-center text-gray-400 italic text-sm">
            There are no records to display
        </div>
        <table id="dept-table" class="hidden w-full text-left border-collapse">
            <thead>
                <tr class="text-gray-700 font-bold border-b border-gray-200 text-sm">
                    <th class="py-3 px-4 w-24">SNo</th>
                    <th class="py-3 px-4">Department Name</th>
                    <th class="py-3 px-4 text-right">Actions</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <!-- Records will appear here -->
            </tbody>
        </table>
    </div>
</div>
